# Global values for LEATrace deployment
global:
  environment: production
  domain: localhost

# Backend FastAPI Service
backend:
  replicaCount: 2
  image:
    repository: leatrace-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# Frontend React Service
frontend:
  replicaCount: 2
  image:
    repository: leatrace-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress Configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: leatrace.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: leatrace-tls-secret
      hosts:
        - leatrace.local

# Dependency toggles
postgresql:
  enabled: false
redis:
  enabled: false

elasticsearch:
  enabled: true
  replicaCount: 3
  image:
    repository: elasticsearch
    tag: 8.12.0
  service:
    port: 9200
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

kibana:
  enabled: true
  replicaCount: 1
  image:
    repository: kibana
    tag: 8.12.0
  service:
    port: 5601
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
