{{- if .Values.kibana.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "leatrace.fullname" . }}-kibana
  labels:
    app: {{ include "leatrace.name" . }}-kibana
spec:
  replicas: {{ .Values.kibana.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "leatrace.name" . }}-kibana
  template:
    metadata:
      labels:
        app: {{ include "leatrace.name" . }}-kibana
    spec:
      containers:
        - name: kibana
          image: "{{ .Values.kibana.image.repository }}:{{ .Values.kibana.image.tag }}"
          ports:
            - containerPort: 5601
              name: ui
          resources:
            {{- toYaml .Values.kibana.resources | nindent 12 }}
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://{{ include "leatrace.fullname" . }}-elasticsearch:{{ .Values.elasticsearch.service.port }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "leatrace.fullname" . }}-kibana
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kibana.service.port }}
      targetPort: ui
      name: ui
  selector:
    app: {{ include "leatrace.name" . }}-kibana
{{- end }}
