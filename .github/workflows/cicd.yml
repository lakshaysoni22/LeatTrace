name: LEATrace CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/leatrace-backend/requirements.txt
        pip install pytest

    - name: Run Backend Tests
      run: |
        # Run pytest inside the backend directory to check service functionality
        python -m pytest backend/leatrace-backend/ -v --ignore=backend/leatrace-backend/node_modules

    - name: Build Docker Image
      run: |
        docker build -t leatrace-gateway:latest -f backend/leatrace-backend/docker/Dockerfile backend/leatrace-backend/
