apiVersion: v1
kind: Namespace
metadata:
  name: LEAtTrace-prod
---
# Pod Disruption Budget for High Availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: LEAtTrace-pdb
  namespace: LEAtTrace-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: LEAtTrace-backend
---
# Network Security Segmentation Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-isolation
  namespace: LEAtTrace-prod
spec:
  podSelector:
    matchLabels:
      role: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: LEAtTrace-backend
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 7687
        - protocol: TCP
          port: 8123
---
# Blue Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: LEAtTrace-backend-blue
  namespace: LEAtTrace-prod
  labels:
    app: LEAtTrace-backend
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: LEAtTrace-backend
      version: blue
  template:
    metadata:
      labels:
        app: LEAtTrace-backend
        version: blue
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - LEAtTrace-backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/LEAtTrace/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /api/health/indexer
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health/indexer
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
# Green Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: LEAtTrace-backend-green
  namespace: LEAtTrace-prod
  labels:
    app: LEAtTrace-backend
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: LEAtTrace-backend
      version: green
  template:
    metadata:
      labels:
        app: LEAtTrace-backend
        version: green
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - LEAtTrace-backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: ghcr.io/LEAtTrace/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /api/health/indexer
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health/indexer
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
# Active Routing Service Selector (Switched during Blue-Green Switchover)
apiVersion: v1
kind: Service
metadata:
  name: LEAtTrace-backend-service
  namespace: LEAtTrace-prod
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: LEAtTrace-backend
    version: blue # Pointing to Blue environment. Switch to 'green' for deployment release.
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: LEAtTrace-hpa
  namespace: LEAtTrace-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: LEAtTrace-backend-blue
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
