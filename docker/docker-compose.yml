version: '3.8'

services:
  # Relational Database
  postgres:
    image: postgres:16-alpine
    container_name: leatrace-postgres
    restart: always
    environment:
      POSTGRES_DB: leatrace
      POSTGRES_USER: leatrace_user
      POSTGRES_PASSWORD: SecureDbPassword2026!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - leatrace-net

  # Graph Database
  neo4j:
    image: neo4j:5.18-community
    container_name: leatrace-neo4j
    restart: always
    ports:
      - "7474:7474"  # HTTP console
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/SecureNeoPassword2026!
    volumes:
      - neo4jdata:/data
    networks:
      - leatrace-net

  # Cache & Event Queue
  redis:
    image: redis:7.2-alpine
    container_name: leatrace-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - leatrace-net

  # Secure Object Storage
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: leatrace-minio
    restart: always
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: SecureMinioPassword2026!
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - leatrace-net

  # FastAPI REST Service Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: leatrace-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://leatrace_user:SecureDbPassword2026!@postgres:5432/leatrace
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SecureNeoPassword2026!
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=SecureMinioPassword2026!
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
      - redis
      - minio
    networks:
      - leatrace-net

  # Vite Client React App
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: leatrace-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - leatrace-net

volumes:
  pgdata:
  neo4jdata:
  redisdata:
  miniodata:

networks:
  leatrace-net:
    driver: bridge
